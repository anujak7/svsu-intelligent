<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVSU Intelligent - Voice Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(ellipse at 50% 80%, #1a2a4a 0%, #060c1a 100%);
            overflow: hidden;
            color: white;
        }

        .hdr {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
            background: rgba(6, 12, 26, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .hdr-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .hdr-brand img {
            height: 36px;
            background: white;
            border-radius: 6px;
            padding: 3px;
        }

        .hdr-brand span {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .btn-back:hover {
            background: rgba(239, 68, 68, 0.7);
        }

        /* Canvas fills below header */
        #av-wrap {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 0;
        }

        #av-wrap canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }

        /* Loader */
        #loader {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 0;
            background: #060c1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 90;
            transition: opacity 0.5s;
        }

        .spin {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #df6d25;
            border-radius: 50%;
            animation: sp 0.85s linear infinite;
        }

        @keyframes sp {
            to {
                transform: rotate(360deg);
            }
        }

        #loader p {
            margin-top: 16px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #94a3b8;
            letter-spacing: 1px;
        }

        #load-pct {
            color: #df6d25;
            margin-left: 6px;
        }

        /* Subtitle */
        #subtitle {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 560px;
            text-align: center;
            font-size: 1.05rem;
            font-weight: 500;
            line-height: 1.6;
            color: #e2e8f0;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.95);
            z-index: 80;
            pointer-events: none;
        }

        /* Controls */
        #controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 18px 0 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(to top, rgba(6, 12, 26, 0.97) 0%, transparent 100%);
            z-index: 80;
        }

        #mic-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #df6d25, #f07e32);
            color: white;
            font-size: 1.7rem;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(223, 109, 37, 0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s;
        }

        #mic-btn:hover {
            transform: scale(1.08);
        }

        #mic-btn.recording {
            background: #ef4444;
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.65);
            animation: pulse 1.4s infinite;
        }

        #mic-btn.processing {
            background: #3b82f6;
            animation: none;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
            }

            50% {
                transform: scale(1.1);
                box-shadow: 0 0 45px rgba(239, 68, 68, 0.7);
            }
        }

        #status-txt {
            margin-top: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #64748b;
        }
    </style>
</head>

<body>

    <header class="hdr">
        <div class="hdr-brand">
            <img src="https://svsu.ac.in/img/SVSU-Logo.png" alt="SVSU">
            <span>SVSU Intelligent</span>
        </div>
        <button class="btn-back" onclick="history.back()"><i class="fas fa-times"></i></button>
    </header>

    <div id="loader">
        <div class="spin"></div>
        <p>Loading SVSU Intelligent...<span id="load-pct"></span></p>
    </div>

    <div id="av-wrap"></div>

    <div id="subtitle">Tap the mic and speak to SVSU Intelligent</div>

    <div id="controls">
        <button id="mic-btn"><i class="fas fa-microphone"></i></button>
        <div id="status-txt">TAP TO TALK</div>
    </div>

    <!-- Three.js served locally from VM (no CDN delay) -->
    <script src="/assets/three.min.js"></script>
    <script src="/assets/GLTFLoader.js"></script>

    <script>
        /* ============================================================
           SVSU Intelligent - 3D Avatar Talk Mode
           Three.js r134 | Procedural Idle Animation | Lip Sync
           ============================================================ */

        // DOM
        const wrap = document.getElementById('av-wrap');
        const loader = document.getElementById('loader');
        const loadPct = document.getElementById('load-pct');
        const subtitle = document.getElementById('subtitle');
        const micBtn = document.getElementById('mic-btn');
        const statusTxt = document.getElementById('status-txt');

        // Three.js
        const W = () => wrap.clientWidth;
        const H = () => wrap.clientHeight;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, W() / H(), 0.1, 1000);
        camera.position.set(0, 1.5, 2.8);
        camera.lookAt(0, 1.0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(W(), H());
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.shadowMap.enabled = true;
        wrap.appendChild(renderer.domElement);

        // Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const key = new THREE.DirectionalLight(0xfff5e0, 1.2);
        key.position.set(1.5, 3, 3);
        scene.add(key);
        const fill = new THREE.DirectionalLight(0x8ac8ff, 0.4);
        fill.position.set(-3, 1, -2);
        scene.add(fill);
        const back = new THREE.DirectionalLight(0xffffff, 0.3);
        back.position.set(0, 5, -5);
        scene.add(back);

        // State
        const clock = new THREE.Clock();
        let mixer = null;
        let model = null;

        // Bone references
        let spineBone = null, headBone = null, jawBone = null;
        let morphTarget = null; // mesh with morph targets for lip sync
        let hasMorphTargets = false;

        // Audio state
        let audioCtx = null, analyser = null, dataArray = null;
        let isPlaying = false, curSource = null;

        // Procedural animation state
        let breathT = 0;
        let blinkT = Math.random() * 3;
        let idleT = 0;

        // Jaw/lip defaults
        let defJaw = null, defHead = null, defSpine = null;

        /* ---- LOAD AVATAR ---- */
        const gltfLoader = new THREE.GLTFLoader();
        gltfLoader.load(
            '/assets/models/avatar.glb',
            (gltf) => {
                model = gltf.scene;
                scene.add(model);

                // Auto-center
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());
                model.position.set(-center.x, -box.min.y, -center.z);

                // Camera frame: upper body shot
                const h = size.y > 0 ? size.y : 1.7;
                camera.position.set(0, h * 0.68, h * 1.35);
                camera.lookAt(0, h * 0.68, 0);

                // Traverse for bones + morph meshes
                model.traverse(child => {
                    if (child.isBone) {
                        const n = child.name.toLowerCase();
                        if (n.includes('jaw')) jawBone = child;
                        if (!headBone && n.includes('head')) headBone = child;
                        if (!spineBone && (n.includes('spine') || n.includes('chest'))) spineBone = child;
                    }
                    if (child.isMesh && child.morphTargetDictionary) {
                        // Find mouth morph targets
                        const keys = Object.keys(child.morphTargetDictionary);
                        const mouthKey = keys.find(k =>
                            k.toLowerCase().includes('open') ||
                            k.toLowerCase().includes('mouth') ||
                            k.toLowerCase().includes('jaw') ||
                            k.toLowerCase().includes('viseme')
                        );
                        if (mouthKey && !morphTarget) {
                            morphTarget = { mesh: child, key: mouthKey, idx: child.morphTargetDictionary[mouthKey] };
                            hasMorphTargets = true;
                            console.log('Mouth morph found:', mouthKey);
                        }
                    }
                });

                // If GLB has animations - play first one
                if (gltf.animations && gltf.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(model);
                    mixer.clipAction(gltf.animations[0]).play();
                    console.log('Playing animation:', gltf.animations[0].name);
                } else {
                    console.log('No embedded animations - using procedural idle');
                }

                console.log('Avatar ready. Jaw:', jawBone?.name, 'Head:', headBone?.name, 'Morph:', hasMorphTargets);

                // Hide loader
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            },
            (xhr) => {
                if (xhr.total) loadPct.textContent = ' ' + Math.round(xhr.loaded / xhr.total * 100) + '%';
            },
            (err) => {
                console.error('GLTFLoader Error:', err);
                document.querySelector('#loader p').textContent = 'Avatar load failed, check console.';
                loader.style.display = 'none';
            }
        );

        /* ---- RENDER LOOP ---- */
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const t = clock.elapsedTime;

            // Embedded animation
            if (mixer) mixer.update(delta);

            // Procedural idle: breathing + subtle sway
            if (model) {
                breathT += delta;
                idleT += delta;

                if (spineBone) {
                    if (defSpine === null) defSpine = spineBone.rotation.z;
                    // Gentle breathing: chest expand
                    spineBone.rotation.z = defSpine + Math.sin(breathT * 0.9) * 0.008;
                    spineBone.rotation.x = (defSpine || 0) + Math.sin(breathT * 0.45) * 0.004;
                }
                if (headBone) {
                    if (defHead === null) defHead = headBone.rotation.y;
                    // Subtle idle head sway
                    headBone.rotation.y = defHead + Math.sin(idleT * 0.3) * 0.02;
                    headBone.rotation.z = (defHead || 0) + Math.sin(idleT * 0.5) * 0.008;
                }
            }

            // Lip Sync
            if (analyser && isPlaying) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for (let i = 0; i < 16; i++) sum += dataArray[i];
                const vol = Math.min(sum / 16 / 128, 1.0);
                applyLipSync(vol);
            } else {
                applyLipSync(0);
            }

            renderer.render(scene, camera);
        }
        animate();

        function applyLipSync(vol) {
            const smooth = 0.35;
            if (hasMorphTargets && morphTarget) {
                const cur = morphTarget.mesh.morphTargetInfluences[morphTarget.idx];
                morphTarget.mesh.morphTargetInfluences[morphTarget.idx] =
                    THREE.MathUtils.lerp(cur, vol * 0.85, smooth);
            } else if (jawBone) {
                if (defJaw === null) defJaw = jawBone.rotation.x;
                jawBone.rotation.x = THREE.MathUtils.lerp(jawBone.rotation.x, defJaw + vol * 0.38, smooth);
            }
        }

        /* ---- RESIZE ---- */
        window.addEventListener('resize', () => {
            camera.aspect = W() / H();
            camera.updateProjectionMatrix();
            renderer.setSize(W(), H());
        });

        /* ============================================================
           AUDIO ENGINE
           ============================================================ */
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            }
        }

        async function playBase64Audio(b64, text) {
            initAudio();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            if (curSource) { try { curSource.stop(); } catch (e) { } }
            subtitle.textContent = text;

            const bin = atob(b64);
            const buf = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);

            audioCtx.decodeAudioData(buf.buffer, decoded => {
                const src = audioCtx.createBufferSource();
                src.buffer = decoded;
                src.connect(analyser);
                analyser.connect(audioCtx.destination);
                src.onended = () => {
                    isPlaying = false;
                    subtitle.textContent = 'Tap the mic and speak to SVSU Intelligent';
                };
                curSource = src;
                isPlaying = true;
                src.start(0);
            }, err => { console.error('Audio decode error:', err); });
        }

        /* ============================================================
           MIC RECORDING
           ============================================================ */
        let mediaRecorder = null, chunks = [], recording = false;

        micBtn.addEventListener('click', async () => {
            initAudio();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            if (!recording) startRec(); else stopRec();
        });

        async function startRec() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const options = { mimeType: 'audio/webm' };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    console.log('audio/webm not supported, falling back to default');
                    mediaRecorder = new MediaRecorder(stream);
                } else {
                    mediaRecorder = new MediaRecorder(stream, options);
                }
                chunks = [];
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
                mediaRecorder.onstop = sendAudio;
                mediaRecorder.start();
                recording = true;
                micBtn.classList.add('recording');
                statusTxt.textContent = 'LISTENING...';
                subtitle.textContent = '';
                if (curSource) { try { curSource.stop(); isPlaying = false; } catch (e) { } }
            } catch (err) {
                subtitle.textContent = 'Microphone access denied. Please allow mic permissions.';
                statusTxt.textContent = 'MIC ERROR';
            }
        }

        function stopRec() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(t => t.stop());
            }
            recording = false;
            micBtn.classList.remove('recording');
            micBtn.classList.add('processing');
            statusTxt.textContent = 'ANALYZING...';
            subtitle.textContent = '';
        }

        async function sendAudio() {
            const blob = new Blob(chunks, { type: 'audio/webm' });
            const form = new FormData();
            form.append('audio_file', blob, 'recording.webm');
            try {
                const res = await fetch('/api/voice', { method: 'POST', body: form });
                micBtn.classList.remove('processing');
                statusTxt.textContent = 'TAP TO TALK';
                if (!res.ok) throw new Error(res.statusText);
                const data = await res.json();
                if (data.audio) playBase64Audio(data.audio, data.response);
                else subtitle.textContent = "I didn't catch that. Please speak again.";
            } catch (e) {
                micBtn.classList.remove('processing');
                statusTxt.textContent = 'TAP TO TALK';
                subtitle.textContent = 'Connection error. Please retry.';
            }
        }
    </script>
</body>

</html>
