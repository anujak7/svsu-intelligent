<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVSU Intelligent - Voice Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Model Viewer — loaded LOCALLY from server (No CDN dependency) -->
    <script type="module" src="/assets/model-viewer.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(ellipse at 50% 80%, #e0f2fe 0%, #ffffff 100%);
            overflow: hidden;
            color: #0f172a;
        }

        .hdr {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
        }

        .hdr-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .hdr-brand img {
            height: 36px;
            background: white;
            border-radius: 6px;
            padding: 3px;
        }

        .hdr-brand span {
            font-size: 1rem;
            font-weight: 700;
        }

        .btn-back {
            background: rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.08);
            color: #0f172a;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-back:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.3);
        }

        /* MODEL-VIEWER fills the space below header */
        model-viewer {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: calc(100vh - 60px);
            background-color: transparent;
            --poster-color: transparent;
        }

        /* LOADER */
        #loader {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at 50% 80%, #e0f2fe 0%, #ffffff 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 90;
            transition: opacity 0.6s;
        }

        .spin {
            width: 52px;
            height: 52px;
            border: 4px solid rgba(0, 0, 0, 0.08);
            border-top-color: #0ea5e9;
            border-radius: 50%;
            animation: sp 0.85s linear infinite;
        }

        @keyframes sp {
            to {
                transform: rotate(360deg);
            }
        }

        #load-status {
            margin-top: 18px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #94a3b8;
            letter-spacing: 1px;
        }

        #load-error {
            margin-top: 10px;
            color: #ef4444;
            font-size: 0.8rem;
            display: none;
            text-align: center;
            max-width: 80%;
        }

        #load-tip {
            margin-top: 14px;
            font-size: 0.7rem;
            color: #475569;
            text-align: center;
            max-width: 70%;
            line-height: 1.5;
        }

        /* GLOW ring behind avatar */
        .av-glow {
            position: fixed;
            bottom: 95px;
            left: 50%;
            transform: translateX(-50%);
            width: 260px;
            height: 50px;
            border-radius: 50%;
            pointer-events: none;
            background: radial-gradient(ellipse, rgba(14, 165, 233, 0.25) 0%, transparent 70%);
            filter: blur(12px);
            z-index: 60;
        }

        /* SUBTITLE */
        #subtitle {
            position: fixed;
            bottom: 122px;
            left: 50%;
            transform: translateX(-50%);
            width: 82%;
            max-width: 560px;
            text-align: center;
            font-size: 1.05rem;
            font-weight: 500;
            line-height: 1.6;
            color: #0f172a;
            text-shadow: 0 4px 16px rgba(255, 255, 255, 0.95);
            z-index: 80;
            pointer-events: none;
        }

        /* CONTROLS */
        #controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 18px 0 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(to top, rgba(255, 255, 255, 0.97) 0%, rgba(255, 255, 255, 0) 100%);
            z-index: 80;
        }

        #mic-btn {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            border: 2px solid #bae6fd;
            background: white;
            color: #0ea5e9;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(14, 165, 233, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #mic-btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 15px 35px rgba(14, 165, 233, 0.35);
            color: #0284c7;
            border-color: #7dd3fc;
        }

        #mic-btn.recording {
            background: #ef4444;
            color: white;
            border-color: #fca5a5;
            animation: pulse-red 1.4s infinite;
        }

        #mic-btn.processing {
            background: #0ea5e9;
            color: white;
            border-color: #7dd3fc;
            animation: none;
        }

        @keyframes pulse-red {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
            }

            50% {
                transform: scale(1.1);
                box-shadow: 0 0 45px rgba(239, 68, 68, 0.7);
            }
        }

        #status-txt {
            margin-top: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #64748b;
        }
    </style>
</head>

<body>

    <header class="hdr">
        <div class="hdr-brand">
            <img src="https://svsu.ac.in/img/SVSU-Logo.png" alt="SVSU" onerror="this.style.display='none'">
            <span>SVSU Intelligent</span>
        </div>
        <button class="btn-back" onclick="history.back()"><i class="fas fa-times"></i></button>
    </header>

    <!-- LOADER -->
    <div id="loader">
        <div class="spin"></div>
        <div id="load-status">Loading avatar...</div>
        <div id="load-error"></div>
        <div id="load-tip">If this takes long, please ensure Hardware Acceleration is enabled in Chrome:<br>Settings →
            System → Use hardware acceleration</div>
    </div>

    <!-- 3D AVATAR via model-viewer with dynamic scale-adapted framing -->
    <model-viewer id="avatar3d" src="/assets/models/BreathingIdle.glb" exposure="1.4" shadow-intensity="1"
        tone-mapping="neutral" autoplay animation-name="mixamo.com" environment-image="neutral" skybox-image=""
        poster="" reveal="eager" interaction-prompt="none">
    </model-viewer>

    <div class="av-glow"></div>
    <div id="subtitle">Tap the mic and speak to SVSU Intelligent</div>

    <div id="controls">
        <button id="mic-btn"><i class="fas fa-microphone"></i></button>
        <div id="status-txt">TAP TO TALK</div>
    </div>

    <script>
        (function () {
            var av = document.getElementById('avatar3d');
            var loader = document.getElementById('loader');
            var loadSt = document.getElementById('load-status');
            var loadEr = document.getElementById('load-error');
            var sub = document.getElementById('subtitle');
            var mic = document.getElementById('mic-btn');
            var stxt = document.getElementById('status-txt');

            // Force-hide loader after 4 seconds
            setTimeout(function () {
                if (loader) { loader.style.opacity = '0'; loader.style.pointerEvents = 'none'; }
            }, 4000);

            // ── model-viewer load events ─────────────────────────────
            av.addEventListener('progress', function (e) {
                var pct = Math.round(e.detail.totalProgress * 100);
                loadSt.textContent = 'Loading... ' + pct + '%';
                if (pct >= 100) {
                    setTimeout(function () { loader.style.opacity = '0'; loader.style.pointerEvents = 'none'; }, 200);
                }
            });

            av.addEventListener('load', function () {
                console.log('[SVSU] model-viewer: avatar loaded!');
                loadSt.textContent = 'Avatar ready!';
                loader.style.opacity = '0';
                loader.style.pointerEvents = 'none';

                var d = av.getDimensions();
                var tY = d.y * 0.72;
                var rad = d.y * 0.55;
                av.cameraTarget = '0m ' + tY + 'm 0m';
                av.cameraOrbit = '0deg 85deg ' + rad + 'm';
                av.fieldOfView = '35deg';
                av.setAttribute('camera-orbit', '0deg 85deg ' + rad + 'm');
                av.setAttribute('camera-target', '0m ' + tY + 'm 0m');
                setTimeout(function () { loader.style.display = 'none'; }, 600);

                // Explicitly play the first animation if available
                if (av.availableAnimations && av.availableAnimations.length > 0) {
                    av.animationName = av.availableAnimations[0];
                    av.play();
                }

                // Dynamically frame the face and upper torso regardless of the model scale
                if (av.getDimensions) {
                    var dim = av.getDimensions();
                    // Set target higher (neck/face level) so the head doesn't get cut off at the top
                    var targetY = dim.y * 0.76;
                    // Balance the orbit radius to show the face clearly but still keep shoulders/arms in view
                    var radius = dim.y * 0.85;

                    av.cameraTarget = `0m ${targetY}m 0m`;
                    av.cameraOrbit = `0deg 85deg ${radius}m`;
                    av.fieldOfView = '45deg';
                    // Optional: Restrict turning too far
                    av.minCameraOrbit = `-25deg 80deg ${radius}m`;
                    av.maxCameraOrbit = `25deg 90deg ${radius}m`;
                }
            });

            av.addEventListener('progress', function (e) {
                var pct = Math.round(e.detail.totalProgress * 100);
                loadSt.textContent = 'Loading avatar... ' + pct + '%';
            });

            av.addEventListener('error', function (e) {
                console.error('[SVSU] model-viewer error:', e.detail);
                loadSt.textContent = 'Avatar load failed';
                loadEr.style.display = 'block';
                loadEr.innerText = 'Error: ' + (e.detail.message || 'Could not load avatar.glb');
                document.querySelector('.spin').style.display = 'none';
                document.getElementById('load-tip').style.display = 'block';
            });

            // Timeout fallback — if no event in 20s, hide loader anyway
            setTimeout(function () {
                if (loader.style.display !== 'none') {
                    loader.style.opacity = '0';
                    setTimeout(function () { loader.style.display = 'none'; }, 600);
                }
            }, 20000);

            // ── AVATAR STATE MACHINE & ANIMATION ─────────────────────
            var avatarState = 'IDLE'; // IDLE, LISTENING, THINKING, TALKING
            var jawNode = null, headNode = null, leftEyeNode = null, rightEyeNode = null;
            var time = 0, lastBlink = 0, nextBlinkDelay = 3, isBlinking = false, blinkStartTime = 0;

            av.addEventListener('load', function () {
                setTimeout(function () {
                    var threeScene = null;
                    try {
                        var symbols = Object.getOwnPropertySymbols(av);
                        for (var i = 0; i < symbols.length; i++) {
                            var sym = symbols[i];
                            if (av[sym] && typeof av[sym].traverse === 'function') { threeScene = av[sym]; break; }
                            else if (av[sym] && av[sym].scene && typeof av[sym].scene.traverse === 'function') { threeScene = av[sym].scene; break; }
                        }
                    } catch (e) { console.warn("Failed to hook Three JS scene."); }

                    if (threeScene) {
                        threeScene.traverse(function (child) {
                            var n = (child.name || '').toLowerCase();
                            // Grab Bones
                            if (child.isBone || child.type === 'Bone' || child.type === 'Object3D') {
                                if (n.includes('jaw')) { jawNode = child; }
                                else if (n.includes('head') && !n.includes('top') && !headNode) { headNode = child; }
                            }
                            // Grab meshes for blinking (eyelashes or face elements that contain eyes)
                            if (child.isMesh || child.type === 'Object3D' || child.type === 'SkinnedMesh') {
                                if (n.includes('eye') || n.includes('body')) {
                                    if (!leftEyeNode) leftEyeNode = child;
                                    else if (!rightEyeNode) rightEyeNode = child;
                                }
                            }
                        });

                        // Base rotations (in native local space, to avoid locking rotation)
                        if (headNode) headNode.userData.baseRot = { x: headNode.rotation.x, y: headNode.rotation.y, z: headNode.rotation.z };
                        if (jawNode) jawNode.userData.baseRot = { x: jawNode.rotation.x, y: jawNode.rotation.y, z: jawNode.rotation.z };
                        console.log('[SVSU] State Machine Rig Hooked: ', { head: !!headNode, jaw: !!jawNode, eyes: !!leftEyeNode });
                    }
                }, 800);
            });

            // ── Audio & Rendering Loop ─────────────────────────────
            var isPlaying = false, analyser = null, dataArray = null;
            var audioCtx = null, curSrc = null;

            function animateAvatar() {
                requestAnimationFrame(animateAvatar);
                time += 0.016; // Approx 60fps

                // 1. Audio Vol (Lip Sync) - Advanced Frequency Analysis
                var vol = 0;
                if (avatarState === 'TALKING' && isPlaying && analyser && dataArray) {
                    analyser.getByteFrequencyData(dataArray);

                    // Human voice core frequencies usually sit in bins 1 through 20 of a 256 FFT
                    var vocalSum = 0;
                    var maxPeak = 0;
                    for (var i = 1; i < 20; i++) {
                        vocalSum += dataArray[i];
                        if (dataArray[i] > maxPeak) maxPeak = dataArray[i];
                    }

                    var averageVol = vocalSum / 19;
                    // Combine average energy with peak energy for snappy syllable hits
                    var rawVol = (averageVol * 0.4) + (maxPeak * 0.6);

                    // Non-linear squaring maps speech accurately
                    var normalizedVol = rawVol / 255.0;
                    vol = Math.pow(normalizedVol, 1.5) * 1.5;
                    vol = Math.min(vol, 1.0);
                }

                // Simulate Jaw Drop using Head if Jaw is missing. Otherwise use Jaw.
                if (jawNode && jawNode.userData && jawNode.userData.baseRot) {
                    var targetJawPitch = jawNode.userData.baseRot.x + (vol * 0.45);
                    jawNode.rotation.x += (targetJawPitch - jawNode.rotation.x) * 0.65;
                }

                // 2. Head Motion depending on state
                if (headNode && headNode.userData && headNode.userData.baseRot) {
                    var tX = headNode.userData.baseRot.x;
                    var tY = headNode.userData.baseRot.y;
                    var tZ = headNode.userData.baseRot.z;

                    if (avatarState === 'LISTENING') {
                        tZ += 0.03; // very subtle tilt
                        tX += 0.02; // very slight nod
                    } else if (avatarState === 'THINKING') {
                        tY += Math.sin(time * 2.0) * 0.02; // Look slightly around
                        tX -= 0.02; // Look slightly up
                    } else if (avatarState === 'TALKING') {
                        tY += Math.sin(time * 3.0) * 0.015; // Horizontal natural movement
                        tX += Math.cos(time * 1.5) * 0.015; // very subtle nod

                        // Fake Lipsync fallback if jaw doesn't exist - slightly bounce head
                        if (!jawNode) {
                            tX += (vol * 0.05); // Bop head quickly to words
                        }
                    }

                    // Apply interpolated smoothing
                    headNode.rotation.x += (tX - headNode.rotation.x) * 0.1;
                    headNode.rotation.y += (tY - headNode.rotation.y) * 0.1;
                    headNode.rotation.z += (tZ - headNode.rotation.z) * 0.1;
                }

                // 3. Eye Blinking Logic
                if (time > lastBlink + nextBlinkDelay && !isBlinking) {
                    isBlinking = true;
                    blinkStartTime = time;
                }

                if (isBlinking) {
                    var bTime = time - blinkStartTime;
                    var bScale = 1.0;

                    if (bTime < 0.1) bScale = 1.0 - (bTime / 0.1); // Close fast
                    else if (bTime < 0.25) bScale = (bTime - 0.1) / 0.15; // Open slightly slower
                    else {
                        isBlinking = false;
                        lastBlink = time;
                        nextBlinkDelay = 3 + Math.random() * 3;
                        bScale = 1.0;
                    }

                    bScale = Math.max(0.01, Math.min(bScale, 1.0));

                    // Scale eyelashes / eyes Y axis to blink
                    if (leftEyeNode) leftEyeNode.scale.setComponent(1, bScale);
                    if (rightEyeNode) rightEyeNode.scale.setComponent(1, bScale);
                }
            }
            animateAvatar();

            // ── Audio Source Handling ────────────────────────────────
            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    analyser = audioCtx.createAnalyser();
                    analyser.fftSize = 256;
                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                }
            }

            function playAudio(b64, text) {
                initAudio();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                if (curSrc) { try { curSrc.stop(); } catch (e) { } }
                sub.textContent = text;
                avatarState = 'TALKING'; // TALKING STATE
                var raw = atob(b64), buf = new Uint8Array(raw.length);
                for (var i = 0; i < raw.length; i++) buf[i] = raw.charCodeAt(i);
                audioCtx.decodeAudioData(buf.buffer, function (decoded) {
                    var src = audioCtx.createBufferSource();
                    src.buffer = decoded;
                    src.connect(analyser); analyser.connect(audioCtx.destination);
                    src.onended = function () {
                        isPlaying = false;
                        avatarState = 'IDLE'; // Revert state
                        sub.textContent = 'Tap the mic and speak to SVSU Intelligent';
                    };
                    curSrc = src;
                    isPlaying = true;
                    src.start(0);
                }, function (e) { console.error('Audio decode failed:', e); });
            }

            // ── Mic & Recording (PRE-WARM & INSTANT) ─────────────────
            var mediaRec = null, chunks = [], recording = false, audioStream = null;
            var voiceHistory = []; // Track context for follow-up questions

            // Pre-warm the microphone
            function prewarmMic() {
                if (audioStream) return;
                navigator.mediaDevices.getUserMedia({ audio: true }).then(function (s) {
                    audioStream = s;
                    console.log("[SVSU] Mic Pre-warmed");
                }).catch(function (err) {
                    console.warn("[SVSU] Mic access denied initially");
                });
            }
            window.addEventListener('click', prewarmMic, { once: true });
            window.addEventListener('touchstart', prewarmMic, { once: true });

            mic.addEventListener('click', function () {
                initAudio();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                if (!recording) startRec(); else stopRec();
            });

            function startRec() {
                if (!audioStream) {
                    navigator.mediaDevices.getUserMedia({ audio: true }).then(function (s) {
                        audioStream = s;
                        startRec();
                    });
                    return;
                }
                const options = { mimeType: 'audio/webm' };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    mediaRec = new MediaRecorder(audioStream);
                } else {
                    mediaRec = new MediaRecorder(audioStream, options);
                }
                chunks = [];
                mediaRec.ondataavailable = function (e) { if (e.data.size > 0) chunks.push(e.data); };
                mediaRec.onstop = sendAudio;

                avatarState = 'LISTENING';
                mic.classList.add('recording');
                stxt.textContent = 'LISTENING...';
                sub.textContent = '';

                if (curSrc) { try { curSrc.stop(); isPlaying = false; } catch (e) { } }
                mediaRec.start();
                recording = true;
            }

            function stopRec() {
                if (mediaRec && mediaRec.state !== 'inactive') {
                    mediaRec.stop();
                }
                recording = false;
                mic.classList.remove('recording');
                mic.classList.add('processing');
                stxt.textContent = 'THINKING...';
                avatarState = 'THINKING';
            }

            function sendAudio() {
                var blob = new Blob(chunks, { type: 'audio/webm' });
                var fd = new FormData();
                fd.append('audio_file', blob, 'rec.webm');

                // Send last 3-4 messages for context without bloating payload
                fd.append('history', JSON.stringify(voiceHistory.slice(-4)));

                fetch('/api/voice', { method: 'POST', body: fd })
                    .then(function (r) {
                        if (!r.ok) throw new Error(r.statusText);
                        return r.json();
                    })
                    .then(function (d) {
                        mic.classList.remove('processing');
                        stxt.textContent = 'TAP TO TALK';

                        if (d.transcription) {
                            voiceHistory.push({ sender: 'user', text: d.transcription });
                        }

                        if (d.audio) {
                            voiceHistory.push({ sender: 'bot', text: d.response });
                            playAudio(d.audio, d.response);
                        } else {
                            avatarState = 'IDLE';
                            sub.textContent = d.response || "I couldn't hear that. Please try again.";
                        }
                    })
                    .catch(function (err) {
                        mic.classList.remove('processing');
                        stxt.textContent = 'TAP TO TALK';
                        avatarState = 'IDLE';
                        sub.textContent = 'Connection error. Please retry.';
                        console.error('[SVSU] Voice API error:', err);
                    });
            }
        })();
    </script>
</body>

</html>
