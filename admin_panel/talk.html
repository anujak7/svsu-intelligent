<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SVSU AI - Talk Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #df6d25;
            --secondary: #1e4b8a;
            --primary-gradient: linear-gradient(135deg, #df6d25 0%, #f07e32 100%);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            display: flex;
            flex-direction: column;
            color: white;
        }

        /* Header */
        .chat-header {
            padding: 0.8rem 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .chat-header .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header img {
            height: 40px;
            background: white;
            padding: 4px;
            border-radius: 8px;
        }

        .chat-header h1 {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 0;
            color: white;
        }

        .btn-close {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .btn-close:hover {
            background: rgba(239, 68, 68, 0.8);
            transform: scale(1.05);
        }

        /* 3D Avatar Container */
        #avatar-container {
            flex: 1;
            width: 100%;
            position: relative;
            background: transparent;
        }

        canvas {
            display: block;
            outline: none;
        }

        /* Subtitle Area */
        .subtitle-area {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 600px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 500;
            line-height: 1.5;
            color: #f8fafc;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
            min-height: 60px;
            pointer-events: none;
            z-index: 5;
        }

        /* Controls Bottom Area */
        .controls-area {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px 0 30px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(to top, rgba(15, 23, 42, 0.9) 0%, rgba(15, 23, 42, 0) 100%);
            z-index: 10;
        }

        .mic-btn-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-mic {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: var(--primary-gradient);
            color: white;
            font-size: 1.8rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(223, 109, 37, 0.4);
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        .btn-mic.recording {
            background: #ef4444;
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.6);
            animation: pulse-mic 1.5s infinite;
        }

        .btn-mic.processing {
            background: #3b82f6;
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.6);
            animation: spin-pulse 2s infinite linear;
        }

        .status-text {
            margin-top: 15px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #cbd5e1;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @keyframes pulse-mic {
            0% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
            }

            50% {
                transform: scale(1.1);
                box-shadow: 0 0 40px rgba(239, 68, 68, 0.8);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
            }
        }

        @keyframes spin-pulse {
            0% {
                transform: scale(1) rotate(0deg);
            }

            50% {
                transform: scale(1.05) rotate(180deg);
            }

            100% {
                transform: scale(1) rotate(360deg);
            }
        }

        /* Loader Overlay for initial 3D load */
        #loader-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <!-- Initial Loader -->
    <div id="loader-overlay">
        <div class="spinner"></div>
        <div style="margin-top: 20px; font-weight: 600; letter-spacing: 1px;">Loading Digital Human...</div>
    </div>

    <!-- Header -->
    <header class="chat-header">
        <div class="logo-area">
            <img src="https://svsu.ac.in/img/SVSU-Logo.png" alt="SVSU">
            <h1>SVSU AI</h1>
        </div>
        <button class="btn-close" onclick="window.location.href='chatbot.html'" title="Exit Voice Mode">
            <i class="fas fa-times"></i>
        </button>
    </header>

    <!-- 3D Avatar Area -->
    <div id="avatar-container"></div>

    <!-- Subtitles -->
    <div class="subtitle-area" id="subtitleText">
        Tap the mic to start speaking...
    </div>

    <!-- Controls -->
    <div class="controls-area">
        <button class="btn-mic" id="micBtn">
            <i class="fas fa-microphone"></i>
        </button>
        <div class="status-text" id="statusText">TAP TO TALK</div>
    </div>

    <!-- Three.js Dependencies (CDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <!-- Custom Logic -->
    <script src="talk.js"></script>

</body>

</html>
