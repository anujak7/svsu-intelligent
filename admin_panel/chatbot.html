<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVSU Intelligent - Premium Chat Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module" src="/assets/model-viewer.min.js"></script>

    <style>
        :root { --svsu-red: #c0392b; --svsu-dark: #0f172a; --svsu-gray: #64748b; --svsu-bg: #f8fafc; }
        html { background: transparent !important; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: transparent !important; display: flex; justify-content: flex-end; align-items: flex-end; padding: 20px; overflow: hidden; height: 100vh; pointer-events: none; }

        /* ── Launcher Section ── */
        .chat-launcher-container { position: fixed; right: 20px; bottom: 20px; width: 120px; height: 120px; z-index: 99999; background: transparent !important; pointer-events: auto; }
        .launcher-fab { width: 100%; height: 100%; cursor: pointer; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; }
        .launcher-fab video { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15)); }
        .launcher-fab:hover { transform: scale(1.1); }
        .launcher-fab.active { transform: scale(0); opacity: 0; pointer-events: none; }

        /* ── Speech Bubble (exact cartoon reference style) ── */
        .speech-bubble-wrap {
            position: absolute;
            /* Positioned above and to the left of the launcher avatar */
            right: 105%;
            bottom: 55px;
            transform-origin: bottom right;
            pointer-events: auto;
            cursor: pointer;
            z-index: 100000;
        }

        .speech-bubble {
            position: relative;
            /* Yellow glossy gradient - matches reference image */
            background: linear-gradient(160deg, #ffe566 0%, #f5c000 45%, #e8a800 100%);
            border: 3px solid #c98a00;
            border-radius: 50px;
            padding: 18px 30px;
            min-width: 200px;
            max-width: 260px;
            text-align: center;
            box-shadow:
                0 6px 20px rgba(200, 130, 0, 0.35),
                inset 0 -4px 10px rgba(180, 100, 0, 0.25);
            /* Closed state: scaled to 0 from origin */
            transform: scale(0);
            opacity: 0;
            transform-origin: bottom right;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
        }

        /* Glossy shine on top — matching the image highlight */
        .speech-bubble::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 16px;
            right: 16px;
            height: 36%;
            background: linear-gradient(180deg, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0) 100%);
            border-radius: 40px 40px 60% 60%;
            pointer-events: none;
        }

        /* Diamond/rotated-square tail — points toward the girl's head (bottom-right) */
        .speech-bubble::after {
            content: '';
            position: absolute;
            right: 28px;
            bottom: -22px;
            width: 28px;
            height: 28px;
            background: #f5c000;
            border-right: 3px solid #c98a00;
            border-bottom: 3px solid #c98a00;
            border-radius: 0 0 8px 0;
            transform: rotate(45deg);
            box-shadow: 3px 3px 0 #c98a00;
        }

        .speech-bubble.open {
            transform: scale(1);
            opacity: 1;
        }

        .bubble-text {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            color: #3d2200;
            line-height: 1.4;
            position: relative;
            z-index: 1;
            opacity: 1;
            transition: opacity 0.22s ease;
        }
        .bubble-text.fading { opacity: 0; }

        /* ── Widget Close Button (Premium Floating Over Corner) ── */
        .widget-close-btn { position: fixed; width: 44px; height: 44px; background: #e74c3c; border: 2px solid white; border-radius: 50%; display: none; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 100005; font-size: 1.2rem; color: white; transition: all 0.3s; pointer-events: auto; }
        .widget-close-btn:hover { background: #c0392b; transform: scale(1.1) rotate(90deg); }

        /* ── Chat Widget ── */
        .chat-widget { width: 380px; height: 600px; background: white; border-radius: 24px; box-shadow: 0 25px 60px rgba(0,0,0,0.2); display: none; flex-direction: column; overflow: hidden; position: relative; pointer-events: auto; animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); border: 1px solid rgba(0,0,0,0.05); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(50px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .chat-header { padding: 12px 20px; background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #edf2f7; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-left img { height: 42px; }
        .header-left span { font-weight: 800; font-size: 1rem; color: var(--svsu-dark); }
        .header-right { display: flex; gap: 10px; align-items: center; }
        
        .talk-toggle { background: var(--svsu-red); color: white; border: none; padding: 6px 14px; border-radius: 20px; font-weight: 700; font-size: 0.8rem; cursor: pointer; transition: 0.2s; }
        .talk-toggle:hover { opacity: 0.9; transform: scale(1.05); }

        .menu-btn { width: 36px; height: 36px; border-radius: 8px; background: #f1f5f9; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--svsu-dark); border: none; }
        
        /* Dropdown */
        .dropdown-menu { position: absolute; top: 60px; right: 20px; background: white; border-radius: 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.15); width: 220px; display: none; flex-direction: column; z-index: 300; border: 1px solid #eee; }
        .dropdown-menu.active { display: flex; animation: fadeIn 0.2s ease; }
        .menu-item { padding: 12px 20px; font-size: 0.9rem; color: #475569; cursor: pointer; }
        .menu-item:hover { background: #f8fafc; color: var(--svsu-red); }
        .menu-item.active { font-weight: 800; color: var(--svsu-red); background: #fef2f2; }

        /* Chat Area */
        .chat-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; background: #ffffff; scroll-behavior: smooth; }
        .msg-row { display: flex; gap: 12px; width: 100%; align-items: flex-start; }
        .bot-row { justify-content: flex-start; }
        .user-row { justify-content: flex-end; }
        .avatar-circle { width: 32px; height: 32px; border-radius: 50%; overflow: hidden; background: white; border: 1px solid #eee; display: flex; align-items: center; justify-content: center; }
        .avatar-circle img { width: 80%; height: 80%; object-fit: contain; }
        .user-avatar-circle { width: 32px; height: 32px; border-radius: 50%; background: var(--svsu-red); color: white; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.9rem; }
        
        .bubble { padding: 12px 18px; border-radius: 18px; font-size: 0.9rem; line-height: 1.6; max-width: 85%; position: relative; word-wrap: break-word; }
        .bot-bubble { background: #f1f5f9; color: var(--svsu-dark); border-top-left-radius: 4px; border: 1px solid #e2e8f0; }
        .user-bubble { background: var(--svsu-red); color: white; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(192, 57, 43, 0.2); }

        /* Input area */
        .input-container { padding: 15px 20px; background: white; border-top: 1px solid #f1f5f9; display: flex; gap: 10px; align-items: flex-end; }
        .input-wrapper { flex: 1; background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 20px; display: flex; padding: 2px 10px; transition: 0.2s; }
        .input-wrapper:focus-within { border-color: var(--svsu-red); background: white; }
        .input-wrapper textarea { flex: 1; border: none; outline: none; padding: 10px 5px; font-size: 0.9rem; resize: none; background: transparent; max-height: 120px; }
        .send-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--svsu-red); color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; flex-shrink: 0; margin-bottom: 2px; }
        .send-btn:hover { transform: scale(1.1); background: #a93226; }

        /* Voice Mode */
        .voice-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: white; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: space-between; padding: 40px 20px; }
        .voice-overlay.active { display: flex; }
        .close-voice { position: absolute; top: 20px; right: 20px; width: 40px; height: 40px; border-radius: 50%; background: #f1f5f9; border: none; cursor: pointer; font-size: 1.2rem; }
        #vSubtitle { font-size: 1.1rem; color: var(--svsu-dark); font-weight: 700; text-align: center; margin-top: 20px; }

        /* Chips */
        .options-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
        .option-chip { padding: 8px 16px; border-radius: 20px; background: white; border: 1.5px solid var(--svsu-red); color: var(--svsu-red); font-weight: 700; font-size: 0.8rem; cursor: pointer; transition: 0.2s; }
        .option-chip:hover { background: var(--svsu-red); color: white; }

        /* Form */
        .premium-form { margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; background: white; padding: 15px; border-radius: 16px; border: 1px solid #e2e8f0; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group.full { grid-column: span 2; }
        .form-group label { font-size: 0.7rem; font-weight: 800; color: var(--svsu-gray); text-transform: uppercase; }
        .form-group input, .form-group select { padding: 10px; border: 1.5px solid #edf2f7; border-radius: 8px; font-size: 0.85rem; outline: none; }
        .form-group input:focus { border-color: var(--svsu-red); }
        .submit-btn { grid-column: span 2; background: var(--svsu-dark); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 800; cursor: pointer; margin-top: 5px; }

        /* Animations */
        @keyframes typing { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .typing-dots span { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--svsu-red); margin: 0 2px; animation: typing 1s infinite; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    </style>
</head>

<body>
    <div class="chat-launcher-container">
        <!-- Speech bubble: tail points to girl's mouth (right-bottom corner) -->
        <div class="speech-bubble-wrap" id="speechBubbleWrap" onclick="toggleChat()">
            <div class="speech-bubble" id="speechBubble">
                <p class="bubble-text" id="bubbleText">Hi, I'm Pihu!</p>
            </div>
        </div>
        <div class="launcher-fab" id="launcherFab">
            <video autoplay muted loop playsinline><source src="/assets/svsugirl.webm" type="video/webm"></video>
        </div>
    </div>

    <button class="widget-close-btn" id="widgetCloseBtn"><i class="fas fa-times"></i></button>

    <div class="chat-widget" id="chatWidget">
        <header class="chat-header">
            <div class="header-left">
                <img src="/assets/logo-svsu.png" alt="SVSU">
                <span>SVSU Intelligent</span>
            </div>
            <div class="header-right">
                <button class="talk-toggle" id="talkBtn">Talk</button>
                <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
            </div>
            <div class="dropdown-menu" id="dropdownMenu">
                <div class="menu-item active" onclick="switchMode('intelligent')">SVSU Intelligent</div>
                <div class="menu-item" onclick="switchMode('general')">Others Query</div>
                <div class="menu-item" onclick="switchMode('admission')">Admission Query</div>
                <div class="menu-item" onclick="resetSession()">Reset Session</div>
            </div>
        </header>

        <main class="chat-area" id="chatArea">
            <div class="msg-row bot-row">
                <div class="avatar-circle"><img src="/assets/logo-svsu.png"></div>
                <div class="bubble bot-bubble">Namaste! I am **Pihu**, your Intelligent SVSU Assistant. How can I guide you today?</div>
            </div>
        </main>

        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="chatInput" placeholder="Type your message..." rows="1"></textarea>
            </div>
            <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
        </div>

        <div class="voice-overlay" id="voiceOverlay">
            <button class="close-voice" id="closeVoice"><i class="fas fa-times"></i></button>
            <model-viewer id="voiceAvatar" src="/assets/models/BreathingIdle_compressed.glb" autoplay interaction-prompt="none" style="width: 100%; height: 60%;"></model-viewer>
            <div id="vSubtitle">I'm listening...</div>
        </div>
    </div>

    <script>
        const chatWidget = document.getElementById('chatWidget');
        const launcherFab = document.getElementById('launcherFab');
        const widgetCloseBtn = document.getElementById('widgetCloseBtn');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatArea = document.getElementById('chatArea');
        const menuBtn = document.getElementById('menuBtn');
        const dropdownMenu = document.getElementById('dropdownMenu');
        const talkBtn = document.getElementById('talkBtn');
        const voiceOverlay = document.getElementById('voiceOverlay');
        const closeVoice = document.getElementById('closeVoice');
        const voiceAvatar = document.getElementById('voiceAvatar');

        let isChatOpen = false;
        let currentBotMode = 'intelligent';
        let chatHistory = [];
        let leadStep = 'name';
        let lead = { name: '', mobile: '', email: '', purpose: '', lead_id: '' };

        // ── Speech Bubble: Open (show) → 2s pause → text fade → next text → close (hide) → 1s pause → repeat ──
        const bubbleTexts = [
            "Hi, I'm Pihu! 👋",
            "Need help with admissions?",
            "Ask me anything about SVSU!",
            "Courses, fees, hostel — ask me!",
            "I'm your SVSU guide 🎓"
        ];
        let bubbleIndex = 0;
        const speechBubble = document.getElementById('speechBubble');
        const bubbleTextEl = document.getElementById('bubbleText');
        const speechBubbleWrap = document.getElementById('speechBubbleWrap');

        function runBubbleCycle() {
            if (isChatOpen) {
                // Chat is open — keep bubble hidden, retry later
                setTimeout(runBubbleCycle, 1000);
                return;
            }
            // Step 1: Open bubble (pop in)
            speechBubbleWrap.style.display = 'block';
            bubbleTextEl.classList.remove('fading');
            bubbleTextEl.innerText = bubbleTexts[bubbleIndex];
            speechBubble.classList.add('open');

            // Step 2: After 2s — fade text out, change text, fade in
            setTimeout(() => {
                if (isChatOpen) return;
                bubbleTextEl.classList.add('fading');
                setTimeout(() => {
                    bubbleIndex = (bubbleIndex + 1) % bubbleTexts.length;
                    bubbleTextEl.innerText = bubbleTexts[bubbleIndex];
                    bubbleTextEl.classList.remove('fading');

                    // Step 3: After another 1.5s — close bubble (pop out)
                    setTimeout(() => {
                        speechBubble.classList.remove('open');
                        // Step 4: After close animation — wait 1s then repeat
                        setTimeout(runBubbleCycle, 1000);
                    }, 1500);
                }, 250);
            }, 2000);
        }

        // Start the cycle after a short initial delay
        setTimeout(runBubbleCycle, 800);

        // ── Navigation ──
        function toggleChat() {
            isChatOpen = !isChatOpen;
            if (isChatOpen) {
                // Hide bubble immediately
                speechBubble.classList.remove('open');
                speechBubbleWrap.style.display = 'none';

                chatWidget.style.display = 'flex';
                launcherFab.classList.add('active');
                setTimeout(() => {
                    const rect = chatWidget.getBoundingClientRect();
                    widgetCloseBtn.style.top = (rect.top - 20) + 'px';
                    widgetCloseBtn.style.right = (window.innerWidth - rect.right - 15) + 'px';
                    widgetCloseBtn.style.display = 'flex';
                    chatInput.focus();
                }, 50);
                if (leadStep === 'name' && lead.name === '') initLeadFlow();
            } else {
                chatWidget.style.display = 'none';
                launcherFab.classList.remove('active');
                widgetCloseBtn.style.display = 'none';
                // Restart bubble cycle
                setTimeout(runBubbleCycle, 600);
            }
        }

        launcherFab.onclick = toggleChat;
        widgetCloseBtn.onclick = toggleChat;
        menuBtn.onclick = (e) => { e.stopPropagation(); dropdownMenu.classList.toggle('active'); };
        document.onclick = () => dropdownMenu.classList.remove('active');

        talkBtn.onclick = () => { voiceOverlay.classList.add('active'); };
        closeVoice.onclick = () => { voiceOverlay.classList.remove('active'); };

        // 3D Avatar Framing
        voiceAvatar.addEventListener('load', () => {
            const d = voiceAvatar.getDimensions();
            const tY = d.y * 0.76;
            const rad = d.y * 0.55;
            voiceAvatar.cameraTarget = `0m ${tY}m 0m`;
            voiceAvatar.cameraOrbit = `0deg 85deg ${rad}m`;
        });

        // ── Lead Flow ──
        function addMsg(role, text) {
            const row = document.createElement('div');
            row.className = `msg-row ${role}-row`;
            const icon = role === 'bot' ? `<div class="avatar-circle"><img src="/assets/logo-svsu.png"></div>` : `<div class="user-avatar-circle">U</div>`;
            row.innerHTML = icon + `<div class="bubble ${role}-bubble">${marked.parse(text)}</div>`;
            chatArea.appendChild(row);
            chatArea.scrollTop = chatArea.scrollHeight;
            return row;
        }

        function initLeadFlow() {
            addMsg('bot', 'Welcome back! Please share your **Name**, **Mobile**, and **Email** to get personalized guidance.');
        }

        async function handleSend(forcedVal = null) {
            const val = forcedVal || chatInput.value.trim();
            if (!val) return;
            if (!forcedVal) { addMsg('user', val); chatInput.value = ''; }

            if (leadStep !== 'chat') {
                await processLead(val);
                return;
            }

            const thinking = addMsg('bot', '<div class="typing-dots"><span></span><span></span><span></span></div>');
            thinking.id = 'thinkingBlock';
            
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ question: val, mode: currentBotMode, history: chatHistory })
                });
                const d = await res.json();
                document.getElementById('thinkingBlock').remove();
                addMsg('bot', d.answer);
                chatHistory.push({sender: 'user', text: val}, {sender: 'bot', text: d.answer});
            } catch (e) {
                document.getElementById('thinkingBlock').innerHTML = 'Connection lost. Retrying...';
            }
        }

        async function processLead(val) {
            // Simplified multi-match logic
            const email = val.match(/\b[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[A-Za-z]{2,24}\b/i)?.[0];
            const mobile = val.match(/(?:\+?91[\s-]*)?([6-9](?:[\s-]?\d){9})\b/)?.[0];
            
            if (email) lead.email = email;
            if (mobile) lead.mobile = mobile.replace(/\D/g, '').slice(-10);
            if (!lead.name) lead.name = val.replace(email || '', '').replace(mobile || '', '').replace(/[^a-zA-Z\s]/g, '').trim();

            if (lead.name && lead.mobile && lead.email) {
                leadStep = 'chat';
                addMsg('bot', `Thank you **${lead.name}**! How can I assist you today?`);
                // Persist lead
                fetch('/api/lead', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(lead) });
            } else {
                if (!lead.name) addMsg('bot', 'Got it. And your **Name**?');
                else if (!lead.mobile) addMsg('bot', 'Please provide a **10-digit mobile number**.');
                else if (!lead.email) addMsg('bot', 'And finally, your **Email Address**?');
            }
        }

        sendBtn.onclick = () => handleSend();
        chatInput.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };

        window.switchMode = (mode) => {
            currentBotMode = mode;
            document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
            document.querySelector(`.menu-item[onclick*="${mode}"]`).classList.add('active');
            addMsg('bot', `Switched to **${mode.charAt(0).toUpperCase() + mode.slice(1)} Mode**.`);
        };

        window.resetSession = () => { sessionStorage.clear(); location.reload(); };
    </script>
</body>
</html>
