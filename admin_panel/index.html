<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVSU Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .logo {
            width: 180px;
            margin-bottom: 2rem;
        }

        h2 {
            color: #102a43;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        p {
            color: #627d98;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #334e68;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #d9e2ec;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input:focus {
            border-color: #df6d25;
            box-shadow: 0 0 0 3px rgba(223, 109, 37, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: #df6d25;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .login-btn:hover {
            background: #c85a1a;
        }

        .error-msg {
            color: #e53e3e;
            margin-top: 1rem;
            display: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <img src="https://svsu.ac.in/img/SVSU-Logo.png" alt="SVSU Logo" class="logo">
        <h2>Admin Dashboard</h2>
        <p>Enter your official credentials to access</p>

        <form id="loginForm">
            <div class="input-group">
                <label for="email">Official Email</label>
                <input type="email" id="email" placeholder="admin@svsu.ac.in" required>
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn">Secure Login</button>
            <div class="error-msg" id="errorMsg">Invalid credentials. Please try again.</div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            if (email.endsWith('@svsu.ac.in') && password === 'svsuindia47') {
                localStorage.setItem('svsu_admin_auth', 'true');
                window.location.href = 'dashboard.html';
            } else {
                errorMsg.style.display = 'block';
            }
        });

        // Check already logged in
        if(localStorage.getItem('svsu_admin_auth') === 'true') {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
